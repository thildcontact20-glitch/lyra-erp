<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LYRA - Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(20px);
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #f5f0e8; }
    p { color: rgba(255,255,255,0.4); font-size: 14px; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #f5f0e8;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      transition: border 0.3s;
    }
    input:focus { border-color: rgba(212,175,55,0.5); }
    button {
      width: 100%;
      padding: 14px;
      background: #d4af37;
      border: none;
      border-radius: 12px;
      color: #0a0f0a;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover { background: #e0b94a; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; }
    .loader { display: none; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0a0f0a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connexion LYRA</h1>
    <p>Accédez à votre espace ERP</p>
    <div id="error" class="error"></div>
    <input type="email" id="email" value="admin@lyra.ci" placeholder="Email" />
    <input type="password" id="password" value="admin123" placeholder="Mot de passe" />
    <button id="btn" onclick="login()">
      <span class="loader" id="loader"><span class="spinner"></span>Connexion...</span>
      <span id="btnText">Se connecter</span>
    </button>
  </div>

  <script>
    async function login() {
      const btn = document.getElementById('btn');
      const loader = document.getElementById('loader');
      const btnText = document.getElementById('btnText');
      const error = document.getElementById('error');
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      btn.disabled = true;
      loader.style.display = 'inline';
      btnText.style.display = 'none';
      error.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (!res.ok) {
          error.textContent = data.error || 'Erreur de connexion';
          error.style.display = 'block';
          btn.disabled = false;
          loader.style.display = 'none';
          btnText.style.display = 'inline';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch(e) {
        error.textContent = 'Erreur réseau: ' + e.message;
        error.style.display = 'block';
        btn.disabled = false;
        loader.style.display = 'none';
        btnText.style.display = 'inline';
      }
    }

    // Auto-submit au chargement
    window.onload = function() {
      setTimeout(login, 500);
    }
  </script>
</body>
</html>
