app = "lyra-vivalys"
primary_region = "fra"

[env]
  NODE_ENV = "production"
  DATABASE_URL = "postgresql://fly-user:SvKR2GiGGmBhPfkwNhaVu9gg@pgbouncer.z23750v178l096d1.flympg.net/fly-db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[deploy]
  release_command = "npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed"

[[services]]
  internal_port = 3000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80
  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
