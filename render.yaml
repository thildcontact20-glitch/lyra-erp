services:
  - type: web
    name: lyra-vivalys
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx prisma db seed
    startCommand: npx next start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lyra-db
          property: connectionString
      - key: JWT_SECRET
        value: lyra-prod-secret-vivalys-2026
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        value: https://lyra.vivalyscompagny.com

databases:
  - name: lyra-db
    plan: free
    databaseName: lyra
    user: lyra
